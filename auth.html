<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Authentication</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .auth-input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .auth-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            outline: none;
        }
        .auth-link:hover {
            color: #10b981;
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-pink-700 min-h-screen flex items-center justify-center p-4">

    <div class="auth-container rounded-2xl p-8 w-full max-w-md shadow-2xl relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2 cursor-pointer transition-transform hover:scale-105" onclick="window.location.href='index.html'">
                <i class="fas fa-compass mr-2 text-emerald-400"></i>
                CareerCompass
            </h1>
            <p class="text-white opacity-80" id="authTitle">Welcome Back</p>
        </div>

        <!-- ============================== -->
        <!-- SIGN IN FORM (Default Visible) -->
        <!-- ============================== -->
        <form id="loginForm" class="space-y-6 transition-opacity duration-300">
            <div>
                <label for="loginEmail" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="loginEmail" placeholder="you@example.com" 
                           class="auth-input w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500"
                           required>
                </div>
            </div>
            
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="loginPassword" placeholder="••••••••" 
                           class="auth-input w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500"
                           required minlength="6">
                </div>
            </div>

            <!-- Error Message Target -->
            <div id="loginError" class="hidden text-red-400 text-sm text-center font-medium bg-red-900 bg-opacity-30 rounded p-2"></div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:-translate-y-1 shadow-lg">
                Sign In
            </button>
            
            <div class="mt-6 text-center">
                <span class="text-white opacity-80">New to CareerCompass? </span>
                <button type="button" id="showRegisterBtn" class="text-emerald-400 auth-link font-semibold">Create an Account</button>
            </div>
        </form>


        <!-- ============================== -->
        <!-- REGISTER FORM (Hidden by default) -->
        <!-- ============================== -->
        <form id="registerForm" class="space-y-5 hidden transition-opacity duration-300">
            
            <div>
                <label for="regUsername" class="block text-sm font-medium text-gray-300 mb-1">Full Name / Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="regUsername" placeholder="John Doe" 
                           class="auth-input w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500"
                           required minlength="3">
                </div>
            </div>

            <div>
                <label for="regEmail" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="regEmail" placeholder="you@example.com" 
                           class="auth-input w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500"
                           required>
                </div>
            </div>
            
            <div>
                <label for="regPassword" class="block text-sm font-medium text-gray-300 mb-1">Create Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" 
                           class="auth-input w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500"
                           required minlength="6">
                </div>
            </div>

            <!-- Error/Success Target for Registration -->
            <div id="regError" class="hidden text-red-400 text-sm text-center font-medium bg-red-900 bg-opacity-30 rounded p-2"></div>

            <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:-translate-y-1 shadow-lg">
                Create Account
            </button>
            
            <div class="mt-6 text-center">
                <span class="text-white opacity-80">Already have an account? </span>
                <button type="button" id="showLoginBtn" class="text-emerald-400 auth-link font-semibold">Sign In Here</button>
            </div>
        </form>

    </div>

    <!-- The Javascript that safely handles both isolated forms -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // UI Elements
            const authTitle = document.getElementById('authTitle');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            const showRegisterBtn = document.getElementById('showRegisterBtn');
            const showLoginBtn = document.getElementById('showLoginBtn');
            
            const loginError = document.getElementById('loginError');
            const regError = document.getElementById('regError');

            // --- Form Toggling Logic ---
            
            showRegisterBtn.addEventListener('click', () => {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                authTitle.textContent = "Start Your Journey";
                
                // Clear any previous errors or inputs
                loginForm.reset();
                loginError.classList.add('hidden');
            });

            showLoginBtn.addEventListener('click', () => {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                authTitle.textContent = "Welcome Back";
                
                // Clear any previous errors or inputs
                registerForm.reset();
                regError.classList.add('hidden');
            });


            // --- SIGN IN Logic ---
            loginForm.addEventListener('submit', (e) => {
                // Prevent browser page reload
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                
                // Quick basic sanity check
                if (!email || !password) {
                    showError(loginError, "Please fill out all fields.");
                    return;
                }

                // Database simulation using LocalStorage
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    // Success! Log the user in
                    localStorage.setItem('currentUser', JSON.stringify({
                        username: user.username,
                        email: user.email,
                        loginTime: new Date().toISOString()
                    }));
                    
                    // Redirect them to where they were trying to go, or home page
                    const redirectUrl = sessionStorage.getItem('redirectUrl') || 'index.html';
                    sessionStorage.removeItem('redirectUrl');
                    window.location.href = redirectUrl;
                } else {
                    // Fail
                    showError(loginError, "Invalid email or password!");
                }
            });


            // --- REGISTER Logic ---
            registerForm.addEventListener('submit', (e) => {
                // Prevent browser page reload
                e.preventDefault();
                
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                
                if (username.length < 3) {
                    showError(regError, "Username must be at least 3 characters.");
                    return;
                }

                if (password.length < 6) {
                    showError(regError, "Password must be at least 6 characters.");
                    return;
                }

                // Check if user already exists
                const users = JSON.parse(localStorage.getItem('users') || "[]");
                if (users.some(user => user.email === email)) {
                    showError(regError, "An account with this email already exists!");
                    return;
                }
                
                // Create user and save to "Database"
                users.push({ username, email, password });
                localStorage.setItem('users', JSON.stringify(users));
                
                // Auto-login after sign up so the user doesn't have to type it again
                const sessionUser = { username, email, createdAt: new Date().toISOString() };
                localStorage.setItem('currentUser', JSON.stringify(sessionUser));
                
                // Optional UI feedback before redirecting
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Account Created!';
                submitBtn.classList.replace('bg-indigo-500', 'bg-emerald-500');
                submitBtn.classList.replace('hover:bg-indigo-600', 'hover:bg-emerald-600');
                
                setTimeout(() => {
                    const redirectUrl = sessionStorage.getItem('redirectUrl') || 'index.html';
                    sessionStorage.removeItem('redirectUrl');
                    window.location.href = redirectUrl;
                }, 800);
            });

            // Helper to show errors
            function showError(element, message) {
                element.textContent = message;
                element.classList.remove('hidden');
                // Shake animation
                element.classList.add('animate-pulse');
                setTimeout(() => element.classList.remove('animate-pulse'), 1000);
            }
        });
    </script>
</body>
</html>
